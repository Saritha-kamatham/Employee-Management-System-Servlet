<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Add Employee</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Add Employee</h2>

<form action="AddEmployeeServlet" method="post">

<input type="number" placeholder="Employee ID" name="empid" required>

<input type="text" placeholder="Employee Name" name="empname" required>

<input type="text" placeholder="Department" name="department" required>

<input type="number" step="0.01" placeholder="Salary" name="salary" required>

<input type="submit" value="Add Employee">

</form>

<br>

<a href="index.html"> Home</a>

</div>

</body>
</html>
